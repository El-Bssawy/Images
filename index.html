<!doctype html>
<html lang="en">
  <head>
    <title>Quiz Application</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/main.css" />
    <link rel="icon" href="./Images/logo.svg" />
  </head>
  <body>
    <div class="quiz-app">
      <div class="quiz-info bg-f-p-20">
        <div class="category">Category: <span>HTML</span></div>
        <div class="count">Questions Count: <span></span></div>
      </div>
      <div class="quiz-area bg-f-p-20"></div>
      <div class="answers-area"></div>
      <button class="submit-button">Submit Answers</button>
      <div class="bullets">
        <div class="spans"></div>
        <div class="countdown"></div>
      </div>
      <div class="results"></div>
    </div>
    <script src="./JS/main.js"></script>
  </body>
</html>
